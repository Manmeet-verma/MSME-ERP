services:
  - type: web
    name: msme-erp-api
    runtime: node
    buildCommand: cd artifacts/api-server && npm install && npm run build
    startCommand: cd artifacts/api-server && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
