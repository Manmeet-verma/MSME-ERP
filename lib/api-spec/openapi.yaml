openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LED Quotation Pro API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: clients
  - name: products
  - name: addons
  - name: quotations
  - name: reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ───────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Users ──────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── Clients ────────────────────────────────────────────────────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Clients list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── Products ───────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── Addons ─────────────────────────────────────────────────────────────────
  /addons:
    get:
      operationId: listAddons
      tags: [addons]
      summary: List addons
      responses:
        "200":
          description: Addons list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Addon"
    post:
      operationId: createAddon
      tags: [addons]
      summary: Create addon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddonInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Addon"

  /addons/{id}:
    patch:
      operationId: updateAddon
      tags: [addons]
      summary: Update addon
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddonUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Addon"
    delete:
      operationId: deleteAddon
      tags: [addons]
      summary: Delete addon
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── Quotations ─────────────────────────────────────────────────────────────
  /quotations:
    get:
      operationId: listQuotations
      tags: [quotations]
      summary: List quotations
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: clientId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Quotations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quotation"
    post:
      operationId: createQuotation
      tags: [quotations]
      summary: Create quotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"

  /quotations/{id}:
    get:
      operationId: getQuotation
      tags: [quotations]
      summary: Get quotation with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quotation with items and addons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationDetail"
    patch:
      operationId: updateQuotation
      tags: [quotations]
      summary: Update quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"
    delete:
      operationId: deleteQuotation
      tags: [quotations]
      summary: Delete quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /quotations/{id}/status:
    patch:
      operationId: updateQuotationStatus
      tags: [quotations]
      summary: Update quotation status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationStatusUpdate"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"

  /quotations/{id}/duplicate:
    post:
      operationId: duplicateQuotation
      tags: [quotations]
      summary: Duplicate a quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Duplicated quotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"

  /quotations/{id}/items:
    post:
      operationId: addQuotationItem
      tags: [quotations]
      summary: Add item to quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationItemInput"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationItem"

  /quotations/{id}/items/{itemId}:
    patch:
      operationId: updateQuotationItem
      tags: [quotations]
      summary: Update quotation item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationItem"
    delete:
      operationId: deleteQuotationItem
      tags: [quotations]
      summary: Delete quotation item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /quotations/{id}/addons:
    post:
      operationId: addQuotationAddon
      tags: [quotations]
      summary: Add addon to quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationAddonInput"
      responses:
        "201":
          description: Addon added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationAddon"

  /quotations/{id}/addons/{addonId}:
    delete:
      operationId: deleteQuotationAddon
      tags: [quotations]
      summary: Remove addon from quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: addonId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── Reports / Dashboard ────────────────────────────────────────────────────
  /reports/dashboard:
    get:
      operationId: getDashboardSummary
      tags: [reports]
      summary: Dashboard summary — totals, pipeline, recent activity
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /reports/monthly:
    get:
      operationId: getMonthlyStats
      tags: [reports]
      summary: Monthly quotation and revenue stats (last 12 months)
      responses:
        "200":
          description: Monthly stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyStat"

  /reports/top-products:
    get:
      operationId: getTopProducts
      tags: [reports]
      summary: Top products by revenue and count
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /reports/pipeline:
    get:
      operationId: getPipelineStats
      tags: [reports]
      summary: Quotation pipeline by status with values
      responses:
        "200":
          description: Pipeline stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineStat"

  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [reports]
      summary: List audit logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ── Auth ──
    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # ── Users ──
    User:
      type: object
      required: [id, username, email, role, isActive, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, sales, viewer]
        isActive:
          type: boolean
        lastLogin:
          type: ["string", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [username, email, password, role]
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, sales, viewer]

    UserUpdate:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
          enum: [admin, sales, viewer]
        isActive:
          type: boolean
        password:
          type: string

    # ── Clients ──
    Client:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        gstNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        quotationCount:
          type: integer
        totalValue:
          type: number
        createdAt:
          type: string

    ClientInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        address:
          type: string
        city:
          type: string
        gstNumber:
          type: string
        notes:
          type: string

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        address:
          type: string
        city:
          type: string
        gstNumber:
          type: string
        notes:
          type: string

    # ── Products ──
    Product:
      type: object
      required: [id, name, category, unit, basePrice, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        description:
          type: ["string", "null"]
        unit:
          type: string
        basePrice:
          type: number
        pixelPitch:
          type: ["string", "null"]
        resolution:
          type: ["string", "null"]
        brightness:
          type: ["string", "null"]
        application:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    ProductInput:
      type: object
      required: [name, category, unit, basePrice]
      properties:
        name:
          type: string
        category:
          type: string
        description:
          type: string
        unit:
          type: string
        basePrice:
          type: number
        pixelPitch:
          type: string
        resolution:
          type: string
        brightness:
          type: string
        application:
          type: string
        isActive:
          type: boolean

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        description:
          type: string
        unit:
          type: string
        basePrice:
          type: number
        pixelPitch:
          type: string
        resolution:
          type: string
        brightness:
          type: string
        application:
          type: string
        isActive:
          type: boolean

    # ── Addons ──
    Addon:
      type: object
      required: [id, name, price, priceType, category, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        priceType:
          type: string
          enum: [fixed, percentage]
        category:
          type: string
        isActive:
          type: boolean

    AddonInput:
      type: object
      required: [name, price, priceType, category]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        priceType:
          type: string
          enum: [fixed, percentage]
        category:
          type: string
        isActive:
          type: boolean

    AddonUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        priceType:
          type: string
          enum: [fixed, percentage]
        category:
          type: string
        isActive:
          type: boolean

    # ── Quotations ──
    Quotation:
      type: object
      required: [id, quotationNumber, status, subtotal, discountAmount, taxAmount, total, createdAt, updatedAt]
      properties:
        id:
          type: integer
        quotationNumber:
          type: string
        clientId:
          type: ["integer", "null"]
        clientName:
          type: ["string", "null"]
        clientCompany:
          type: ["string", "null"]
        createdByName:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, sent, approved, rejected, expired]
        validUntil:
          type: ["string", "null"]
        subtotal:
          type: number
        discountAmount:
          type: number
        discountPercent:
          type: number
        taxAmount:
          type: number
        taxPercent:
          type: number
        total:
          type: number
        notes:
          type: ["string", "null"]
        terms:
          type: ["string", "null"]
        itemCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    QuotationDetail:
      type: object
      required: [id, quotationNumber, status, subtotal, discountAmount, taxAmount, total, items, quotationAddons, createdAt, updatedAt]
      properties:
        id:
          type: integer
        quotationNumber:
          type: string
        clientId:
          type: ["integer", "null"]
        clientName:
          type: ["string", "null"]
        clientCompany:
          type: ["string", "null"]
        clientEmail:
          type: ["string", "null"]
        clientPhone:
          type: ["string", "null"]
        clientAddress:
          type: ["string", "null"]
        clientGstNumber:
          type: ["string", "null"]
        createdByName:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, sent, approved, rejected, expired]
        validUntil:
          type: ["string", "null"]
        subtotal:
          type: number
        discountAmount:
          type: number
        discountPercent:
          type: number
        taxAmount:
          type: number
        taxPercent:
