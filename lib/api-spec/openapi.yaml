openapi: 3.1.0
info:
  title: Quotation App
  version: 2.0.0
  description: Multi-tenant SaaS quotation & CRM platform for MSMEs

servers:
  - url: /api

tags:
  - name: Health
  - name: Auth
  - name: Organizations
  - name: Members
  - name: Invitations
  - name: Clients
  - name: Products
  - name: Addons
  - name: Quotations
  - name: Reports
  - name: AuditLogs
  - name: SMS

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"

  # ── Auth ──
  /auth/signup:
    post:
      tags: [Auth]
      summary: Sign up a new user (without org)
      operationId: signup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: signed up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/signup-with-org:
    post:
      tags: [Auth]
      summary: Sign up a new user and create their organization in one step
      operationId: signupWithOrg
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupWithOrgInput"
      responses:
        "201":
          description: signed up with org
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with email + password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the current user and their organizations
      operationId: getMe
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

  /auth/switch-org:
    post:
      tags: [Auth]
      summary: Switch the active organization
      operationId: switchOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organizationId]
              properties:
                organizationId:
                  type: integer
      responses:
        "200":
          description: switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwitchOrgResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      operationId: logout
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Organizations ──
  /organizations:
    post:
      tags: [Organizations]
      summary: Create a new organization (signed-in user becomes Owner)
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationInput"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrgResponse"

  /organizations/current:
    get:
      tags: [Organizations]
      summary: Get the active organization
      operationId: getCurrentOrganization
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    patch:
      tags: [Organizations]
      summary: Update the active organization
      operationId: updateCurrentOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationUpdate"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/current/modules:
    put:
      tags: [Organizations]
      summary: Update enabled modules
      operationId: updateOrganizationModules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModulesInput"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/current/members:
    get:
      tags: [Members]
      summary: List members of the active organization
      operationId: listMembers
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"

  /organizations/current/members/{userId}:
    patch:
      tags: [Members]
      summary: Update a member's role
      operationId: updateMemberRole
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: "#/components/schemas/MemberRole"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    delete:
      tags: [Members]
      summary: Remove a member from the active organization
      operationId: removeMember
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /organizations/current/invitations:
    get:
      tags: [Invitations]
      summary: List pending invitations
      operationId: listInvitations
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invitation"
    post:
      tags: [Invitations]
      summary: Invite a teammate by email
      operationId: createInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationInput"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"

  /organizations/current/invitations/{id}:
    delete:
      tags: [Invitations]
      summary: Revoke an invitation
      operationId: revokeInvitation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /invitations/{token}:
    get:
      tags: [Invitations]
      summary: Get invitation details by token (public)
      operationId: getInvitation
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationPublic"

  /invitations/{token}/accept:
    post:
      tags: [Invitations]
      summary: Accept an invitation
      operationId: acceptInvitation
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwitchOrgResponse"

  # ── Clients ──
  /clients:
    get:
      tags: [Clients]
      operationId: listClients
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Client" }
    post:
      tags: [Clients]
      operationId: createClient
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClientInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Client" }
  /clients/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Clients]
      operationId: getClient
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Client" }
    patch:
      tags: [Clients]
      operationId: updateClient
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClientUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Client" }
    delete:
      tags: [Clients]
      operationId: deleteClient
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  # ── Products ──
  /products:
    get:
      tags: [Products]
      operationId: listProducts
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: isActive
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Product" }
    post:
      tags: [Products]
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
  /products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Products]
      operationId: getProduct
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
    patch:
      tags: [Products]
      operationId: updateProduct
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
    delete:
      tags: [Products]
      operationId: deleteProduct
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  # ── Addons ──
  /addons:
    get:
      tags: [Addons]
      operationId: listAddons
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Addon" }
    post:
      tags: [Addons]
      operationId: createAddon
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddonInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Addon" }
  /addons/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    patch:
      tags: [Addons]
      operationId: updateAddon
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddonUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Addon" }
    delete:
      tags: [Addons]
      operationId: deleteAddon
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  # ── Quotations ──
  /quotations:
    get:
      tags: [Quotations]
      operationId: listQuotations
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: clientId
          in: query
          schema: { type: integer }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Quotation" }
    post:
      tags: [Quotations]
      operationId: createQuotation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuotationInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quotation" }

  /quotations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Quotations]
      operationId: getQuotation
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuotationDetail" }
    patch:
      tags: [Quotations]
      operationId: updateQuotation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuotationUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quotation" }
    delete:
      tags: [Quotations]
      operationId: deleteQuotation
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  /quotations/{id}/status:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    patch:
      tags: [Quotations]
      operationId: updateQuotationStatus
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuotationStatusUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quotation" }

  /quotations/{id}/duplicate:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Quotations]
      operationId: duplicateQuotation
      responses:
        "201":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quotation" }

  /quotations/{id}/items:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Quotations]
      operationId: addQuotationItem
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuotationItemInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuotationItem" }

  /quotations/{id}/items/{itemId}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
      - name: itemId
        in: path
        required: true
        schema: { type: integer }
    patch:
      tags: [Quotations]
      operationId: updateQuotationItem
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuotationItemUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuotationItem" }
    delete:
      tags: [Quotations]
      operationId: deleteQuotationItem
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  /quotations/{id}/addons:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Quotations]
      operationId: addQuotationAddon
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuotationAddonInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuotationAddon" }

  /quotations/{id}/addons/{addonId}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
      - name: addonId
        in: path
        required: true
        schema: { type: integer }
    delete:
      tags: [Quotations]
      operationId: deleteQuotationAddon
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  /quotations/{id}/send-sms:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [SMS]
      operationId: sendQuotationSms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, message]
              properties:
                phone: { type: string }
                message: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  # ── Reports ──
  /reports/dashboard:
    get:
      tags: [Reports]
      operationId: getDashboardSummary
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /reports/monthly:
    get:
      tags: [Reports]
      operationId: getMonthlyReport
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MonthlyStat" }

  /reports/top-products:
    get:
      tags: [Reports]
      operationId: getTopProducts
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TopProduct" }

  /reports/pipeline:
    get:
      tags: [Reports]
      operationId: getPipeline
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PipelineStat" }

  /audit-logs:
    get:
      tags: [AuditLogs]
      operationId: listAuditLogs
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditLog" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthCheckResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok] }

    MessageResponse:
      type: object
      required: [message]
      properties:
        message: { type: string }

    # ── Auth ──
    User:
      type: object
      required: [id, name, email]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        phone: { type: ["string", "null"] }

    MemberRole:
      type: string
      enum: [owner, admin, sales, viewer]

    OrgSummary:
      type: object
      required: [id, name, slug, role]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        role: { $ref: "#/components/schemas/MemberRole" }

    AuthResponse:
      type: object
      required: [token, user, activeOrgId, organizations]
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
        activeOrgId: { type: ["integer", "null"] }
        organizations:
          type: array
          items: { $ref: "#/components/schemas/OrgSummary" }

    MeResponse:
      type: object
      required: [user, activeOrgId, organizations]
      properties:
        user: { $ref: "#/components/schemas/User" }
        activeOrgId: { type: ["integer", "null"] }
        organizations:
          type: array
          items: { $ref: "#/components/schemas/OrgSummary" }

    SwitchOrgResponse:
      type: object
      required: [token, activeOrgId, role]
      properties:
        token: { type: string }
        activeOrgId: { type: integer }
        role: { $ref: "#/components/schemas/MemberRole" }

    SignupInput:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }

    SignupWithOrgInput:
      type: object
      required: [name, email, password, organizationName]
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        organizationName: { type: string }
        industry: { type: string }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    # ── Organizations ──
    OrgModules:
      type: object
      required: [sales, leads, inventory, purchase, marketing, hr, accounting, social]
      properties:
        sales: { type: boolean }
        leads: { type: boolean }
        inventory: { type: boolean }
        purchase: { type: boolean }
        marketing: { type: boolean }
        hr: { type: boolean }
        accounting: { type: boolean }
        social: { type: boolean }

    OrgLimits:
      type: object
      required: [members, leadsPerMonth, emailsPerMonth, storageMB]
      properties:
        members: { type: integer }
        leadsPerMonth: { type: integer }
        emailsPerMonth: { type: integer }
        storageMB: { type: integer }

    Organization:
      type: object
      required: [id, name, slug, plan, limits, modules, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        plan: { type: string, enum: [free, starter, pro] }
        industry: { type: ["string", "null"] }
        gstNumber: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        limits: { $ref: "#/components/schemas/OrgLimits" }
        modules: { $ref: "#/components/schemas/OrgModules" }
        createdAt: { type: string }

    OrganizationInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        industry: { type: string }
        gstNumber: { type: string }
        state: { type: string }
        address: { type: string }
        phone: { type: string }

    OrganizationUpdate:
      type: object
      properties:
        name: { type: string }
        industry: { type: string }
        gstNumber: { type: string }
        state: { type: string }
        address: { type: string }
        phone: { type: string }

    CreateOrgResponse:
      type: object
      required: [token, organization, role]
      properties:
        token: { type: string }
        organization: { $ref: "#/components/schemas/Organization" }
        role: { $ref: "#/components/schemas/MemberRole" }

    ModulesInput:
      type: object
      properties:
        sales: { type: boolean }
        leads: { type: boolean }
        inventory: { type: boolean }
        purchase: { type: boolean }
        marketing: { type: boolean }
        hr: { type: boolean }
        accounting: { type: boolean }
        social: { type: boolean }

    Member:
      type: object
      required: [id, userId, name, email, role, isActive, joinedAt]
      properties:
        id: { type: integer }
        userId: { type: integer }
        name: { type: string }
        email: { type: string }
