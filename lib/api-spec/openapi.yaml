components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthCheckResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok] }

    MessageResponse:
      type: object
      required: [message]
      properties:
        message: { type: string }

    # ── Auth ──
    User:
      type: object
      required: [id, name, email]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        phone: { type: ["string", "null"] }

    MemberRole:
      type: string
      enum: [owner, admin, sales, viewer]

    OrgSummary:
      type: object
      required: [id, name, slug, role]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        role: { $ref: "#/components/schemas/MemberRole" }

    AuthResponse:
      type: object
      required: [token, user, activeOrgId, organizations]
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
        activeOrgId: { type: ["integer", "null"] }
        organizations:
          type: array
          items: { $ref: "#/components/schemas/OrgSummary" }

    MeResponse:
      type: object
      required: [user, activeOrgId, organizations]
      properties:
        user: { $ref: "#/components/schemas/User" }
        activeOrgId: { type: ["integer", "null"] }
        organizations:
          type: array
          items: { $ref: "#/components/schemas/OrgSummary" }

    SwitchOrgResponse:
      type: object
      required: [token, activeOrgId, role]
      properties:
        token: { type: string }
        activeOrgId: { type: integer }
        role: { $ref: "#/components/schemas/MemberRole" }

    SignupInput:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }

    SignupWithOrgInput:
      type: object
      required: [name, email, password, organizationName]
      properties:
        name: { type: string }
