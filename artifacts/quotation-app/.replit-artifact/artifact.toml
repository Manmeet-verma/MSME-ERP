kind = "web"
previewPath = "/"
title = "LED Quotation Pro"
version = "1.0.0"
id = "artifacts/quotation-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18991

[services.development]
run = "pnpm --filter @workspace/quotation-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quotation-app", "run", "build" ]
publicDir = "artifacts/quotation-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18991"
BASE_PATH = "/"
